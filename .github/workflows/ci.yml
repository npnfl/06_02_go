name: CI

on:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
        
        - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.19'      
      - name: Download dependencies
        run: go mod download
        
      - name: Build Binary
        run:  go build -o dummy-server.bin ./cmd
      - name: Simple Test
        run: |
          ./dummy-server.bin &
          sleep 3
          curl -s  https://localhost:8888
          kill $!
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: ./dummy-server.bin

